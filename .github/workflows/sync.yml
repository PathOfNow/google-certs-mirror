name: Sync Google Certs

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync_job:
    runs-on: ubuntu-latest

    steps:
    # 不再使用 actions/checkout 插件，直接用纯原生命令克隆仓库
    - name: Clone Repository
      run: |
        git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" .

    - name: Download Google Public Key
      run: |
        mkdir -p certs
        curl -fSsL "https://www.googleapis.com/oauth2/v3/certs" -o certs/google_auth_certs.json

    - name: Commit and Push
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add certs/google_auth_certs.json
        if git diff --staged --quiet; then
          echo "证书没有发生变化，跳过本次更新。"
        else
          git commit -m "自动同步谷歌证书: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
          git push
        fi
